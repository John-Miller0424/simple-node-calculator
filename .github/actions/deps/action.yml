name: deps
description: Install NodeJS dependencies

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4

    - name: Install Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version-file: ".nvmrc"
        cache: "pnpm"
        # use the lockfile as well as the pnpm-workspace.yaml file as a cache hash,
        # so that changing pnpm settings like `onlyBuiltDependencies` will also clear the cache
        cache-dependency-path: "pnpm-*.yaml"

    - name: Install dependencies
      shell: bash
      run: pnpm install --prefer-offline --frozen-lockfile
