name: Release Branch Commit Alert

on:
  push:
    branches:
      - release-[0-9]+.[0-9]+.[0-9]+

jobs:
  release-branch-commit-alert:
    runs-on: ubuntu-latest
    # skip release branch creation, we only need to be alerted on subsequent pushes
    if: ${{ !github.event.created }}
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL_MAIN_TECH }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "New commit(s) have been pushed to branch `${{ github.ref_name }}` 🔔 @qa"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "`${{ join(github.event.commits.*.message, '`\n`') }}`"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "https://github.com/RequestFinance/invoicing/commits/${{ github.ref_name }}/"
                    }
                  ]
                }
              ]
            }
